<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      if (location.hostname === 'rolw.app') {
        location.replace('https://www.rolw.app' + location.pathname + location.search + location.hash);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ROLW Church - Sign Up">
  <title>ROLW Church - Sign Up</title>
  <script>
    (function () {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'css/styles.css?v=' + Date.now();
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>

  <div class="signup-page">

    <div class="signup-card">
      <h1>ROLW Dashboard</h1>
      <p>Create your account to get started.</p>

      <form class="signup-form" action="#" method="post">
        <div class="form-group">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" required>
        </div>

        <div class="form-group">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
      </form>

      <p id="form-error" class="form-error"></p>
      <p class="signup-login-link">Already have an account? <a href="logIn.html">Log in</a></p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/signUp.js"></script>

</body>
</html>
