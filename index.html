<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      if (location.hostname === 'rolw.app') {
        location.replace('https://www.rolw.app' + location.pathname + location.search + location.hash);
        return;
      }

      var s = window.location.search || '';
      var h = window.location.hash || '';
      var combined = s + h;

      function wwwBase() {
        return location.hostname === 'www.rolw.app' ? 'https://www.rolw.app/' : '';
      }

      function go(path) {
        location.replace(wwwBase() + path + s + h);
      }

      var frag = h.replace(/^#/, '');
      var q = s.indexOf('?') === 0 ? s.slice(1) : s;
      var sp = new URLSearchParams(q);
      var hp = new URLSearchParams(frag);

      var typeRecovery = (sp.get('type') || hp.get('type') || '').toLowerCase() === 'recovery'
        || combined.indexOf('type%3Drecovery') !== -1;

      if (typeRecovery) {
        go('reset-password.html');
        return;
      }

      var hasCode = /(?:^|[?&#])code=/.test(combined);

      var resetStarted = false;
      try {
        var ts = localStorage.getItem('rolw_pw_reset_started');
        resetStarted = ts && !isNaN(parseInt(ts, 10)) && Date.now() - parseInt(ts, 10) < 24 * 60 * 60 * 1000;
      } catch (e) {}

      if (hasCode) {
        if (resetStarted) {
          go('reset-password.html');
        } else {
          go('logIn.html');
        }
        return;
      }

      if (frag.indexOf('access_token=') !== -1) {
        go('logIn.html');
        return;
      }

      if (/[?&]error=/.test(s)) {
        go('logIn.html');
        return;
      }

      location.replace(wwwBase() + 'sign-up.html');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROLW Church</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <noscript>
    <p class="signup-page" style="padding:2rem;font-family:system-ui,sans-serif"><a href="https://www.rolw.app/sign-up.html">Sign up</a> · <a href="https://www.rolw.app/logIn.html">Log in</a></p>
  </noscript>
</body>
</html>
