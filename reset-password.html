<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      if (location.hostname === 'rolw.app') {
        location.replace('https://www.rolw.app' + location.pathname + location.search + location.hash);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ROLW Church - Reset password">
  <title>ROLW Church - Reset password</title>
  <script>
    (function () {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'css/styles.css?v=' + Date.now();
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>

  <div class="signup-page">

    <div class="signup-card">
      <h1>ROLW Dashboard</h1>
      <p>Set a new password for your account.</p>

      <div id="password-recovery-section" class="password-recovery-section">
        <div class="form-group">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" name="new-password" autocomplete="new-password" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm-new-password">Confirm new password</label>
          <input type="password" id="confirm-new-password" autocomplete="new-password" required minlength="6">
        </div>
        <button type="button" id="save-new-password" class="btn-signup">Save password</button>
        <p id="recovery-error" class="form-error"></p>
      </div>

      <p class="signup-login-link"><a href="logIn.html">Back to log in</a></p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/resetPassword.js"></script>

</body>
</html>
